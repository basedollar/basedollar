specVersion: 1.2.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: BoldToken
    source:
      abi: BoldToken
      address: "0x06a350096397728c8158baf5e80841b2aacb6eb1"
      startBlock: 42636202
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Collateral
        - CollateralAddresses
        - AeroGauge
      abis:
        - name: ActivePool
          file: ../contracts/out/ActivePool.sol/ActivePool.json
        - name: BorrowerOperations
          file: ../contracts/out/BorrowerOperations.sol/BorrowerOperations.json
        - name: BoldToken
          file: ../contracts/out/BoldToken.sol/BoldToken.json
        - name: CollateralRegistry
          file: ../contracts/out/CollateralRegistry.sol/CollateralRegistry.json
        - name: ERC20
          file: ../contracts/out/ERC20.sol/ERC20.json
        - name: TroveManager
          file: ../contracts/out/TroveManager.sol/TroveManager.json
        - name: TroveNFT
          file: ../contracts/out/TroveNFT.sol/TroveNFT.json
      eventHandlers:
        - event: CollateralRegistryAddressChanged(address)
          handler: handleCollateralRegistryAddressChanged
      file: ./src/BoldToken.mapping.ts
    network: base-sepolia
templates:
  - name: TroveManager
    kind: ethereum/contract
    network: base-sepolia
    source:
      abi: TroveManager
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/TroveManager.mapping.ts
      entities:
        - Trove
        - TroveSnapshot
        - InterestRateBracket
        - InterestBatch
        - BorrowerInfo
        - Collateral
        - CollateralAddresses
      abis:
        - name: TroveManager
          file: ../contracts/out/TroveManager.sol/TroveManager.json
        - name: TroveNFT
          file: ../contracts/out/TroveNFT.sol/TroveNFT.json
      eventHandlers:
        - event: TroveOperation(indexed
            uint256,uint8,uint256,uint256,uint256,int256,uint256,int256)
          handler: handleTroveOperation
          receipt: true
        - event: TroveUpdated(indexed
            uint256,uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleTroveUpdated
        - event: BatchedTroveUpdated(indexed
            uint256,address,uint256,uint256,uint256,uint256,uint256)
          handler: handleBatchedTroveUpdated
          receipt: true
        - event: BatchUpdated(indexed
            address,uint8,uint256,uint256,uint256,uint256,uint256,uint256)
          handler: handleBatchUpdated
  - name: TroveNFT
    kind: ethereum/contract
    network: base-sepolia
    source:
      abi: TroveNFT
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/TroveNFT.mapping.ts
      entities:
        - BorrowerInfo
        - Trove
      abis:
        - name: TroveNFT
          file: ../contracts/out/TroveNFT.sol/TroveNFT.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
  - name: AeroManager
    kind: ethereum/contract
    network: base-sepolia
    source:
      abi: AeroManager
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/AeroManager.mapping.ts
      entities:
        - AeroStake
        - AeroClaim
        - AeroDistribution
      abis:
        - name: AeroManager
          file: ../contracts/out/AeroManager.sol/AeroManager.json
      eventHandlers:
        - event: Staked(indexed address,address,uint256,uint256)
          handler: handleStaked
        - event: StakedRemaining(indexed address,address,uint256)
          handler: handleStakedRemaining
        - event: Claimed(indexed address,uint256,uint256,indexed uint256)
          handler: handleClaimed
        - event: AeroDistributed(indexed address,uint256,uint256,indexed uint256)
          handler: handleAeroDistributed
  - name: CollateralRegistry
    kind: ethereum/contract
    network: base-sepolia
    source:
      abi: CollateralRegistry
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/CollateralRegistry.mapping.ts
      entities:
        - Collateral
        - CollateralAddresses
        - AeroGauge
      abis:
        - name: ActivePool
          file: ../contracts/out/ActivePool.sol/ActivePool.json
        - name: BorrowerOperations
          file: ../contracts/out/BorrowerOperations.sol/BorrowerOperations.json
        - name: CollateralRegistry
          file: ../contracts/out/CollateralRegistry.sol/CollateralRegistry.json
        - name: TroveManager
          file: ../contracts/out/TroveManager.sol/TroveManager.json
        - name: TroveNFT
          file: ../contracts/out/TroveNFT.sol/TroveNFT.json
      eventHandlers:
        - event: CollateralBranchAdded(uint256,uint256,address,address,bool)
          handler: handleCollateralBranchAdded
  - name: CollSurplusPool
    kind: ethereum/contract
    network: base-sepolia
    source:
      abi: CollSurplusPool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/CollSurplusPool.mapping.ts
      entities:
        - BorrowerInfo
      abis:
        - name: CollSurplusPool
          file: ../contracts/out/CollSurplusPool.sol/CollSurplusPool.json
      eventHandlers:
        - event: CollBalanceUpdated(indexed address,uint256)
          handler: handleCollBalanceUpdated
